<div class="auth-wrapper">
  <div class="auth-card card animate-slide-up">
    <div class="auth-header">
      <h2>{{ modoRegistro() ? 'Crear Cuenta' : 'Bienvenido de nuevo' }}</h2>
      <p class="text-muted">{{ modoRegistro() ? 'Unite a Lizard Store hoy' : 'Ingresa tus credenciales para continuar' }}</p>
    </div>

    @if (error()) {
      <div class="alert alert-error">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="submit()" class="auth-form mt-2">
      <div class="form-group form-full">
        <label class="form-label" for="username">Usuario</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input 
            class="form-input input-with-icon" 
            type="text" 
            id="username" 
            name="username" 
            [(ngModel)]="username" 
            placeholder="Ej. admin"
            required
            autocomplete="username"
          >
        </div>
      </div>

      <div class="form-group form-full">
        <label class="form-label" for="password">Contrasena</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input 
            class="form-input input-with-icon" 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="password" 
            placeholder="&bull;&bull;&bull;&bull;&bull;&bull;"
            required
            autocomplete="current-password"
          >
        </div>
      </div>

      <button class="btn btn-coral btn-lg auth-submit" type="submit" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span>
          {{ modoRegistro() ? 'Registrando...' : 'Ingresando...' }}
        } @else {
          {{ modoRegistro() ? 'Registrarse' : 'Ingresar' }}
        }
      </button>


    </form>
  </div>
</div>
