server:
  port: 8080

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN:TEST-2128438547700199-112106-9448752ba0582dafb3c9ccdd2d8cdad8-2324988531}
  public-key: ${MERCADOPAGO_PUBLIC_KEY:TEST-3516d8de-f63d-4bd0-9973-6e09bea624d6}
  webhook-url: ${MERCADOPAGO_WEBHOOK_URL:}
  frontend-url: ${MERCADOPAGO_FRONTEND_URL:http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true
