server:
  port: 29061

spring:
  kafka:
    bootstrap-servers: localhost:41092
  datasource:
    url: jdbc:postgresql://localhost:15435/lizard_pago_db
    username: lizard
    password: lizard
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${local.server.port:${random.value}}
    metadata-map:
      instance-port: ${local.server.port:${server.port}}
  client:
    service-url:
      defaultZone: http://localhost:18761/eureka

springdoc:
  swagger-ui:
    path: /swagger-ui.html

mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN:TEST-2128438547700199-112106-9448752ba0582dafb3c9ccdd2d8cdad8-2324988531}
  public-key: ${MERCADOPAGO_PUBLIC_KEY:TEST-3516d8de-f63d-4bd0-9973-6e09bea624d6}
  webhook-url: ${MERCADOPAGO_WEBHOOK_URL:http://localhost:18080/api/v1/pagos/webhook}
  frontend-url: ${MERCADOPAGO_FRONTEND_URL:http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
