name: lizard-infra

services:
  config:
    build:
      context: ./config
      dockerfile: Dockerfile
    container_name: lizard-config
    restart: unless-stopped
    ports:
      - "28888:8888"
    volumes:
      - ./config/config-repo:/config-repo
    environment:
      SERVER_PORT: 8888
      SPRING_PROFILES_ACTIVE: native
      CONFIG_REPO_LOCATION: file:/config-repo
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - lizard-prod-net

  eureka:
    build:
      context: ./eureka
      dockerfile: Dockerfile
    container_name: lizard-eureka
    restart: unless-stopped
    ports:
      - "28761:8761"
    environment:
      SERVER_PORT: 8761
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_SERVER_URL: http://lizard-config:8888
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      config:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - lizard-prod-net

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: lizard-gateway
    restart: unless-stopped
    ports:
      - "28082:8080"
    volumes:
      - ./gateway/logs:/app/logs
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_SERVER_URL: http://lizard-config:8888
    depends_on:
      config:
        condition: service_healthy
      eureka:
        condition: service_healthy
    networks:
      - lizard-prod-net

networks:
  lizard-prod-net:
    name: lizard-prod-net
