name: lizard-pago-dev

services:
  postgres-pago-dev:
    image: postgres:16-alpine
    container_name: lizard-postgres-pago-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: lizard_pago_db
      POSTGRES_USER: lizard
      POSTGRES_PASSWORD: lizard
    ports:
      - "15435:5432"
    volumes:
      - lizard_pago_dev_data:/var/lib/postgresql/data

volumes:
  lizard_pago_dev_data:
