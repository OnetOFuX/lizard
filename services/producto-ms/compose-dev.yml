name: lizard-producto-dev

services:
  postgres-producto-dev:
    image: postgres:16-alpine
    container_name: lizard-postgres-producto-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: lizard_producto_db
      POSTGRES_USER: lizard
      POSTGRES_PASSWORD: lizard
    ports:
      - "15433:5432"
    volumes:
      - lizard_producto_dev_data:/var/lib/postgresql/data

volumes:
  lizard_producto_dev_data:
