name: lizard-orden-prod

services:
  postgres-orden:
    image: postgres:16-alpine
    container_name: lizard-postgres-orden
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - lizard_orden_data:/var/lib/postgresql/data
    ports:
      - "25434:5432"
    networks:
      - lizard-orden-int

  orden-ms:
    build: .
    container_name: lizard-orden-ms
    restart: unless-stopped
    depends_on:
      postgres-orden:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      DB_HOST: lizard-postgres-orden
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    volumes:
      - ./logs:/app/logs
    networks:
      - lizard-orden-int
      - lizard-prod-net

volumes:
  lizard_orden_data:

networks:
  lizard-prod-net:
    external: true
    name: lizard-prod-net
  lizard-orden-int:
    name: lizard-orden-int
