name: lizard-orden-dev

services:
  postgres-orden-dev:
    image: postgres:16-alpine
    container_name: lizard-postgres-orden-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: lizard_orden_db
      POSTGRES_USER: lizard
      POSTGRES_PASSWORD: lizard
    ports:
      - "15434:5432"
    volumes:
      - lizard_orden_dev_data:/var/lib/postgresql/data

volumes:
  lizard_orden_dev_data:
